body{height:auto;min-height:100%;overflow-y:visible;-webkit-overflow-scrolling:touch}
body{
  font-family:'Tajawal',system-ui,sans-serif;
  background:var(--bg);color:var(--ink);
  line-height:1.6;-webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
h1,h2,h3,.disp{font-family:'Cairo',sans-serif;font-weight:700;line-height:1.3}
.mono,.num{font-family:var(--mono);font-feature-settings:"tnum"}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#c4d2de;border-radius:6px}
::-webkit-scrollbar-track{background:transparent}

/* ── الشريط العلوى ── */
.topbar{
  position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg,var(--brand) 0%,var(--brand-dark) 100%);
  color:#fff;padding:env(safe-area-inset-top) 0 0;
  box-shadow:0 2px 14px rgba(9,63,99,.22);
}
.topbar-inner{display:flex;align-items:center;gap:14px;padding:13px 18px;max-width:1280px;margin:0 auto}
.logo{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.14);
  display:grid;place-items:center;flex-shrink:0;border:1px solid rgba(255,255,255,.18)}
.logo svg{width:24px;height:24px}
.brand-txt{display:flex;flex-direction:column;min-width:0}
.brand-txt .net{font-family:'Cairo';font-weight:700;font-size:1.05rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand-txt .sub{font-size:.72rem;opacity:.82;font-weight:500}
.topbar-spacer{flex:1}
.icon-btn{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;
  background:rgba(255,255,255,.12);transition:.15s;border:1px solid rgba(255,255,255,.14)}
.icon-btn:hover{background:rgba(255,255,255,.22)}
.icon-btn svg{width:19px;height:19px}

/* ── التبويبات ── */
.tabs{position:sticky;top:62px;z-index:40;background:var(--surface);
  border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabs-inner{display:flex;gap:2px;padding:0 12px;max-width:1280px;margin:0 auto}
.tab{padding:13px 16px;font-weight:600;color:var(--ink-2);white-space:nowrap;
  border-bottom:2.5px solid transparent;transition:.15s;font-size:.92rem;display:flex;align-items:center;gap:7px}
.tab svg{width:17px;height:17px}
.tab:hover{color:var(--brand)}
.tab.active{color:var(--brand);border-bottom-color:var(--brand)}

/* ── الحاوية ── */
.wrap{max-width:1280px;margin:0 auto;padding:18px}
.view{display:none;animation:fade .25s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── البطاقات ── */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);overflow:hidden}
.card-head{padding:15px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-title{font-family:'Cairo';font-weight:700;font-size:1.02rem;display:flex;align-items:center;gap:9px}
.card-title .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.card-sub{font-size:.78rem;color:var(--ink-3);font-weight:500}
.card-body{padding:18px}

.grid{display:grid;gap:14px}
.grid.cols-2{grid-template-columns:repeat(2,1fr)}
.grid.cols-3{grid-template-columns:repeat(3,1fr)}
.grid.cols-4{grid-template-columns:repeat(4,1fr)}
@media(max-width:900px){.grid.cols-3,.grid.cols-4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.grid.cols-2,.grid.cols-3,.grid.cols-4{grid-template-columns:1fr}}

/* ── KPI ── */
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;inset-inline-start:0;top:0;bottom:0;width:4px;background:var(--brand)}
.kpi.ok::before{background:var(--ok)}.kpi.warn::before{background:var(--warn)}.kpi.danger::before{background:var(--danger)}
.kpi .label{font-size:.78rem;color:var(--ink-2);font-weight:600;margin-bottom:6px}
.kpi .value{font-family:var(--mono);font-weight:600;font-size:1.7rem;color:var(--ink);line-height:1.1}
.kpi .unit{font-size:.82rem;color:var(--ink-3);font-weight:500;margin-inline-start:4px}
.kpi .foot{font-size:.74rem;color:var(--ink-3);margin-top:6px}

.net-info-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
@media(max-width:640px){.net-info-row{grid-template-columns:1fr}}
.net-info-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;
  padding:20px 22px;box-shadow:var(--shadow);position:relative;overflow:hidden;text-align:right}
.net-info-card::before{content:"";position:absolute;inset-inline-end:0;top:0;bottom:0;width:6px;
  background:var(--accent,var(--brand));border-radius:0 16px 16px 0}
.net-info-card .ni-label{font-size:.92rem;color:var(--accent,var(--ink-2));font-weight:700;margin-bottom:10px}
.net-info-card .ni-value{font-family:'Cairo',var(--mono);font-weight:800;font-size:2.4rem;color:var(--ink);line-height:1}
.net-info-card .ni-unit{font-size:1rem;color:var(--ink-3);font-weight:600;margin-inline-start:8px}
.net-info-card .ni-foot{font-size:.86rem;color:var(--ink-3);margin-top:10px;font-weight:500}

/* ── الجداول ── */
.tbl-wrap{overflow-x:auto;overflow-y:hidden;border-radius:var(--radius-s)}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th,td{padding:10px 12px;text-align:right;border-bottom:1px solid var(--line)}
th{background:var(--surface-2);font-weight:700;color:var(--ink-2);font-size:.8rem;white-space:nowrap;position:sticky;top:0}
td.num,th.num{font-family:var(--mono);text-align:center}
tbody tr{transition:.12s}
tbody tr:hover{background:var(--surface-2)}
tbody tr:last-child td{border-bottom:none}

/* ── أزرار ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:var(--radius-s);
  font-weight:700;font-size:.88rem;transition:.15s;border:1px solid transparent}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--brand);color:#fff}
.btn-primary:hover{background:var(--brand-dark)}
.btn-ghost{background:var(--surface);border-color:var(--line);color:var(--ink-2)}
.btn-ghost:hover{border-color:var(--brand);color:var(--brand)}
.btn-sm{padding:6px 11px;font-size:.8rem}
.btn-danger{background:var(--danger-bg);color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}

/* ── شارات ── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:.74rem;font-weight:700}
.badge.ok{background:var(--ok-bg);color:var(--ok)}
.badge.warn{background:var(--warn-bg);color:var(--warn)}
.badge.danger{background:var(--danger-bg);color:var(--danger)}
.badge.brand{background:var(--brand-bg);color:var(--brand)}

/* ── حقول ── */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.field label{font-size:.82rem;font-weight:600;color:var(--ink-2)}
.field input,.field select,.field textarea{
  padding:9px 12px;border:1px solid var(--line);border-radius:var(--radius-s);
  background:var(--surface);color:var(--ink);transition:.15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-bg)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.field-row{grid-template-columns:1fr}}

/* ── حالة فارغة ── */
.empty{text-align:center;padding:48px 20px;color:var(--ink-3)}
.empty svg{width:54px;height:54px;opacity:.4;margin-bottom:14px}
.empty .t{font-family:'Cairo';font-weight:700;color:var(--ink-2);font-size:1.05rem;margin-bottom:6px}
.empty .d{font-size:.88rem;max-width:340px;margin:0 auto 18px}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(15,34,51,.5);backdrop-filter:blur(3px);
  z-index:100;display:none;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-l);
  width:100%;max-width:560px;margin:auto 0;animation:pop .2s ease}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
.modal-head{padding:17px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:1.08rem}
.modal-body{padding:20px;max-height:64vh;overflow-y:auto}
.modal-foot{padding:15px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-start}

/* ── Toast ── */
.toast-host{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-weight:600;font-size:.88rem;
  box-shadow:var(--shadow-l);animation:slideup .25s ease;display:flex;align-items:center;gap:9px}
.toast.ok{background:var(--ok)}.toast.danger{background:var(--danger)}.toast.warn{background:var(--warn)}
@keyframes slideup{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ── شريط الأحباس ── */
.reach-bar{display:flex;gap:0;border-radius:var(--radius-s);overflow:hidden;border:1px solid var(--line);margin-bottom:4px}
.reach-seg{flex:1;padding:10px 8px;text-align:center;font-size:.78rem;font-weight:700;color:#fff;position:relative}
.reach-seg .km{font-family:var(--mono);font-size:.68rem;opacity:.85;font-weight:400;display:block}

.row-actions{display:flex;gap:5px}
.mini-btn{width:30px;height:30px;border-radius:7px;display:grid;place-items:center;background:var(--surface-2);transition:.12s}
.mini-btn:hover{background:var(--brand-bg);color:var(--brand)}
.mini-btn svg{width:15px;height:15px}
.mini-btn.del:hover{background:var(--danger-bg);color:var(--danger)}

.section-title{font-family:'Cairo';font-weight:700;font-size:1.15rem;margin:6px 0 14px;display:flex;align-items:center;gap:9px}
.section-title svg{width:22px;height:22px;color:var(--brand);flex-shrink:0}
.card-title svg{width:18px;height:18px;flex-shrink:0}
.empty svg{width:54px!important;height:54px!important}
.card-body svg:not([width]){width:18px;height:18px}
.kpi svg{width:18px;height:18px}
.toolbar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.toolbar .grow{flex:1}
.hint{font-size:.8rem;color:var(--ink-3);background:var(--surface-2);border:1px dashed var(--line);
  border-radius:var(--radius-s);padding:10px 14px;margin-bottom:14px}
.setup-note{background:var(--brand-bg);border:1px solid #bcd8ec;border-radius:var(--radius-s);padding:12px 15px;
  font-size:.85rem;color:var(--brand-dark);margin-bottom:16px;display:flex;gap:10px;align-items:flex-start}
.setup-note svg{width:18px;height:18px;flex-shrink:0;margin-top:2px}


/* ═══════════════════════════════════════════
   🏛️ الثيم التراثى — الخديوية (1863-1869)
   ═══════════════════════════════════════════ */
@keyframes none0{}
body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse at 30% 20%, rgba(120,90,50,.10) 0, transparent 55%),
    radial-gradient(ellipse at 70% 80%, rgba(90,60,30,.12) 0, transparent 55%),
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(90,60,30,.012) 3px, rgba(90,60,30,.012) 4px);
}
/* ورق بردى بملمس */
.wrap{
  background:var(--paper);
  min-height:auto;
  background-image:
    radial-gradient(ellipse at 12% 8%, rgba(160,130,80,.14) 0, transparent 35%),
    radial-gradient(ellipse at 88% 4%, rgba(140,100,60,.12) 0, transparent 30%),
    radial-gradient(ellipse at 50% 96%, rgba(120,90,50,.13) 0, transparent 40%),
    radial-gradient(ellipse at 95% 92%, rgba(140,100,60,.10) 0, transparent 30%);
  border-left:3px double var(--gold);
  border-right:3px double var(--gold);
  box-shadow:var(--shadow-l), inset 0 0 60px rgba(120,90,50,.10);
  position:relative;
}
/* الكروت = لوحات بردى بإطار مزدوج وزوايا مزخرفة */
.card,.kpi,.net-info-card{
  background:linear-gradient(155deg,#f6ecd6 0%, #efe2c4 100%)!important;
  border:2px solid var(--brand)!important;
  border-radius:5px!important;
  box-shadow:var(--shadow), inset 0 0 0 1px rgba(168,132,60,.35), inset 0 0 22px rgba(160,130,80,.10)!important;
  position:relative;
}
/* زوايا مزخرفة على الكروت */
.card::before,.kpi::before{
  content:"";position:absolute;top:4px;right:4px;width:16px;height:16px;
  border-top:2px solid var(--gold);border-right:2px solid var(--gold);
  border-radius:0 4px 0 0;opacity:.7;pointer-events:none;z-index:3;
}
.card::after,.kpi::after{
  content:"";position:absolute;bottom:4px;left:4px;width:16px;height:16px;
  border-bottom:2px solid var(--gold);border-left:2px solid var(--gold);
  border-radius:0 0 0 4px;opacity:.7;pointer-events:none;
}
/* العناوين بخط النسخ الفخم */
.section-title{
  font-family:var(--hand)!important;
  font-size:2rem!important;font-weight:700!important;
  color:var(--brand)!important;justify-content:center;
  position:relative;padding-bottom:14px;letter-spacing:.5px;
  text-shadow:1px 1px 0 rgba(168,132,60,.25);
}
/* زخرفة تحت العنوان (خط مزدوج بنقطة) */
.section-title::after{
  content:"❧";position:absolute;bottom:-6px;right:50%;transform:translateX(50%);
  color:var(--gold);font-size:1.4rem;
  width:auto;height:auto;background:none;
}
.section-title::before{
  content:"";position:absolute;bottom:6px;right:50%;transform:translateX(50%);
  width:200px;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold) 20%,var(--gold) 80%,transparent);
}
/* تسميات KPI */
.kpi .label,.net-info-card .ni-label{font-family:var(--hand)!important;font-size:1.15rem!important;font-weight:700!important;color:var(--brand)!important}
.kpi .value,.net-info-card .ni-value{font-family:var(--mono)!important;font-weight:700!important;color:var(--ink)!important}
.kpi .foot,.net-info-card .ni-foot{color:var(--ink-2)!important}
/* الأزرار = أزرار نحاسية تراثية */
.btn{
  border:2px solid var(--brand)!important;
  border-radius:5px!important;
  box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.3)!important;
  font-family:var(--hand)!important;font-size:1.05rem!important;font-weight:700!important;
  background:linear-gradient(180deg,#ecdcb8,#dcc594)!important;color:var(--brand-dark)!important;
  transition:transform .1s,box-shadow .1s;letter-spacing:.3px;
}
.btn:active{transform:translateY(1px)}
.btn-primary{background:linear-gradient(180deg,#7a5630,#5a3e22)!important;color:#f4ead2!important;border-color:var(--brand-dark)!important}
.btn-ghost{background:linear-gradient(180deg,#ecdcb8,#dcc594)!important}
.btn-sm{font-size:.95rem!important;padding:6px 13px!important}
/* شريط التبويبات */
.tabs{
  background:linear-gradient(180deg,#e8dabb,#ddca9f)!important;
  border-bottom:3px double var(--brand)!important;
}
.tab{font-family:var(--hand)!important;font-size:1.15rem!important;font-weight:700!important;color:var(--ink-2)!important}
.tab.active{color:var(--brand)!important;position:relative}
.tab.active::after{
  content:"";position:absolute;bottom:0;right:10%;width:80%;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
/* الهيدر العلوى = ترويسة تاريخية */
.topbar{
  background:linear-gradient(180deg,#5a3e22 0%,#3d2814 100%)!important;
  border-bottom:3px double var(--gold)!important;
  box-shadow:0 3px 14px rgba(61,40,20,.4)!important;
}
.brand-txt .net{font-family:var(--hand)!important;font-weight:700!important;font-size:1.3rem!important;color:#f4ead2!important;letter-spacing:.5px}
.brand-txt .sub{color:#d8c49c!important}
.logo{
  border:2px solid var(--gold)!important;border-radius:5px!important;
  background:rgba(244,234,210,.12)!important;
}
.logo svg{color:#f4ead2}
.icon-btn{border:1.5px solid rgba(168,132,60,.5)!important;border-radius:5px!important;color:#f4ead2!important}
/* الجداول = سجلّات تراثية */
table{font-family:var(--mono)}
th{
  background:linear-gradient(180deg,#ddca9f,#d3bd8e)!important;
  font-family:var(--hand)!important;font-size:1.1rem!important;font-weight:700!important;
  color:var(--brand-dark)!important;border-bottom:2px solid var(--brand)!important;
  text-shadow:0 1px 0 rgba(255,255,255,.2);
}
td{border-bottom:1px solid rgba(191,168,120,.5)!important;color:var(--ink)!important}
tbody tr:nth-child(even){background:rgba(168,132,60,.06)!important}
tbody tr:hover{background:rgba(168,132,60,.14)!important}
.tbl-wrap{border:2px solid var(--brand);border-radius:5px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;touch-action:pan-x pan-y;scroll-behavior:smooth;box-shadow:inset 0 0 0 1px rgba(168,132,60,.3);position:relative}
/* تلميح التمرير الأفقى */
.scroll-hint{display:flex;align-items:center;gap:6px;justify-content:flex-start;
  font-family:var(--hand);font-size:.9rem;color:var(--accent);margin:0 0 6px;
  animation:hintpulse 2s ease-in-out infinite}
@keyframes hintpulse{0%,100%{opacity:.5;transform:translateX(0)}50%{opacity:1;transform:translateX(-4px)}}
@media(min-width:760px){.scroll-hint{display:none}}
/* جداول متجاوبة: على الشاشات الصغيرة صغّر الخط والحشو ليدخل كل المحتوى */
@media(max-width:560px){
  .tbl-wrap table{font-size:.74rem}
  .tbl-wrap th,.tbl-wrap td{padding:6px 5px!important}
  .tbl-wrap th{font-size:.82rem!important}
}
@media(max-width:400px){
  .tbl-wrap table{font-size:.68rem}
  .tbl-wrap th,.tbl-wrap td{padding:5px 3px!important}
}
/* السماح بالتمرير الأفقى للجداول داخل الكروت */
.card:has(.tbl-wrap){overflow:visible!important}
.card{overflow:visible!important}
tfoot tr{background:linear-gradient(180deg,#ddca9f,#d3bd8e)!important;border-top:2px solid var(--brand);font-family:var(--hand)}
/* الحقول */
input,select,textarea{
  font-family:var(--mono)!important;
  border:2px solid var(--line)!important;
  border-radius:5px!important;
  background:#faf3e0!important;color:var(--ink)!important;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand)!important;box-shadow:0 0 0 2px rgba(168,132,60,.25)!important}
/* العناوين الفرعية */
.card-title{font-family:var(--hand)!important;font-size:1.3rem!important;font-weight:700!important;color:var(--brand)!important}
.card-sub{color:var(--ink-2)!important}
.hint{font-family:var(--hand)!important;font-size:1.08rem!important;color:var(--ink-2)!important;
  background:var(--warn-bg);border:1.5px solid var(--gold);border-radius:5px;padding:9px 13px}
/* الشارات */
.badge,.chip,.pill{font-family:var(--hand)!important;border:1.5px solid currentColor!important;border-radius:4px!important;font-weight:700}
/* الأزرار العائمة */
.fab,[class*="fab"]{border:2px solid var(--gold)!important;box-shadow:var(--shadow-l)!important}
/* النوافذ المنبثقة */
.modal,.sheet,.dialog,.modal-card{border:3px double var(--brand)!important;border-radius:6px!important;box-shadow:var(--shadow-l)!important;background:var(--paper)!important}
.modal-head,.modal-foot{background:linear-gradient(180deg,#e8dabb,#ddca9f)!important;border-color:var(--line)!important}
.modal-head h3{font-family:var(--hand)!important;font-size:1.3rem!important;color:var(--brand)!important}
/* الفراغات */
.empty .t{font-family:var(--hand)!important;font-size:1.45rem!important;color:var(--brand)!important}
.empty .d{font-family:var(--hand)!important;font-size:1.1rem!important;color:var(--ink-2)!important}
/* شريط الأحباس بألوان تراثية */
.reach-bar,.reach-cell{font-family:var(--hand)}
/* النقاط الملونة */
.dot{filter:saturate(.7)}

/* ═══ بانر الخديوية ═══ */
.heritage-banner{
  display:grid;grid-template-columns:90px 1fr 150px;gap:14px;align-items:center;
  background:linear-gradient(155deg,#f0e4c8 0%,#e6d6b2 100%);
  border:3px double var(--brand);border-radius:8px;
  padding:18px 16px;margin-bottom:20px;position:relative;
  box-shadow:var(--shadow), inset 0 0 0 1px rgba(168,132,60,.4), inset 0 0 40px rgba(160,130,80,.12);
}

<script>
"use strict";
/* ════════════════════════════════════════════════════════════════════
   التوأم الرقمى لشبكات الرى — قالب عام (V1)
   مستوحى من معمارية توأم الإسماعيلية، مُصمَّم معلَمياً لأى شبكة.
   ملف واحد · Vanilla JS · Light theme · Arabic RTL · PWA
   ════════════════════════════════════════════════════════════════════ */

/* ────────────────────────────────────────────────
   1) إعداد الشبكة الافتراضى (يُحرَّر من تبويب الإعداد)
   ──────────────────────────────────────────────── */
const DEFAULT_CONFIG = {
  name: "شبكة رى جديدة",
  shortName: "Irrigation DT",
  totalLengthKm: 0,
  moqannan: { summer: 30, winter: 18 },   /* م³/فدان/يوم */
  annualQuotaBCM: 0,
  summerMonths: [5, 6, 7, 8, 9],
  reaches: [],   /* {idx,name,from,to} */
  admins: [],    /* {code,name,color} */
  sheetSyncUrl: "",    /* رابط Apps Script Web App لمزامنة القراءات */
  sheetAutoSync: false /* مزامنة تلقائية عند الفتح */
};

/* مفاتيح التخزين المحلى */
const LS = {
  config:   "irrdt.config.v1",
  branches: "irrdt.branches.v1",
  readings: "irrdt.readings.v1"
};

/* الحالة العامة */
const State = {
  config: null,
  branches: [],     /* الترع/الفروع */
  readings: {},     /* { "YYYY-MM-DD": { branchId: {front,back,flow} } } */
  tab: "overview",
  readDate: todayKey()
};

function todayKey(d){ d=d||new Date(); return d.toISOString().slice(0,10); }

/* ────────────────────────────────────────────────
   2) المحرّك الهيدروليكى (Manning) — قطاع شبه منحرف
   ──────────────────────────────────────────────── */
const Hydraulics = {
  g: 9.81,
  /* مساحة القطاع شبه المنحرف: عرض القاع b، ميل الجانب z، العمق y */
  area: (b, z, y) => (b + z * y) * y,
  /* المحيط المبلل */
  perimeter: (b, z, y) => b + 2 * y * Math.sqrt(1 + z * z),
  /* نصف القطر الهيدروليكى */
  hydraulicRadius(b, z, y){
    const A = this.area(b, z, y), P = this.perimeter(b, z, y);
    return P > 0 ? A / P : 0;
  },
  /* التصرف بمعادلة مانينج: Q = (1/n)·A·R^(2/3)·S^(1/2) */
  discharge(b, z, y, n, S){
    if(!(n > 0) || !(S > 0) || !(y > 0)) return 0;
    const A = this.area(b, z, y), R = this.hydraulicRadius(b, z, y);
    return (1 / n) * A * Math.pow(R, 2/3) * Math.sqrt(S);
  },
  /* السرعة */
  velocity(b, z, y, n, S){
    const A = this.area(b, z, y);
    return A > 0 ? this.discharge(b, z, y, n, S) / A : 0;
  },
  /* العمق الطبيعى عكسياً من تصرف معلوم (تنصيف) */
  normalDepth(b, z, n, S, Q, yMax){
    if(!(Q > 0)) return 0;
    let lo = 1e-4, hi = yMax || 20, mid = 0;
    for(let i = 0; i < 60; i++){
      mid = (lo + hi) / 2;
      const q = this.discharge(b, z, mid, n, S);
      if(q < Q) lo = mid; else hi = mid;
    }
    return mid;
  }
};

/* تحديد الموسم الحالى */
function isSummer(d){
  d = d || new Date();
  return (State.config.summerMonths || []).includes(d.getMonth() + 1);
}
function currentMoqannan(){
  const m = State.config.moqannan || {summer:0,winter:0};
  return isSummer() ? m.summer : m.winter;
}

  const e = document.createElement(tag);
  if(attrs) for(const k in attrs){
    if(k === "class") e.className = attrs[k];
    else if(k === "html") e.innerHTML = attrs[k];
    else if(k.startsWith("on") && typeof attrs[k] === "function") e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  if(html != null) e.innerHTML = html;
  return e;
}

  if(n == null || isNaN(n)) return "—";

}

<script>

/* ────────────────────────────────────────────────
   6) الهيكل العام (Shell)
   ──────────────────────────────────────────────── */
function renderShell(){
  const c = State.config;
  $("#app").innerHTML = `
    <header class="topbar">
      <div class="topbar-inner">
        <div class="logo">${ICON.wave}</div>
        <div class="brand-txt">

        <button class="icon-btn" title="تحديث القراءات من جوجل شيت" onclick="syncFromSheet(false)">${ICON.refresh||ICON.download}</button>
        <button class="icon-btn" title="تصدير البيانات" onclick="exportAll()">${ICON.download}</button>
        <button class="icon-btn" title="استيراد البيانات" onclick="importPrompt()">${ICON.upload}</button>
      </div>
    </header>
    <nav class="tabs"><div class="tabs-inner" id="tabsInner"></div></nav>
    <main class="wrap" id="viewHost"></main>
  `;
  const ti = $("#tabsInner");
  TABS.forEach(t => {
    ti.appendChild(el("button", {
      class:"tab" + (t.id===State.tab?" active":""),
      onclick:()=>switchTab(t.id)
    }, t.icon + "<span>"+t.label+"</span>"));
  });
  renderView();
}
function switchTab(id){
  State.tab = id;
  $$(".tab").forEach((b,i)=>b.classList.toggle("active", TABS[i].id===id));
  renderView();
  window.scrollTo({top:0,behavior:"smooth"});
}
function renderView(){
  const host = $("#viewHost");
  host.innerHTML = "";
  const v = el("div", {class:"view active"});
  v.innerHTML = VIEWS[State.tab] ? VIEWS[State.tab]() : "";
  host.appendChild(v);
  if(AFTER[State.tab]) AFTER[State.tab]();
}

/* هل الشبكة مُعدّة؟ */
function isConfigured(){
  return State.config.name && State.config.name !== DEFAULT_CONFIG.name
      || State.config.reaches.length || State.config.admins.length || State.branches.length;
}
function setupBanner(){
  if(isConfigured()) return "";
  return `<div class="setup-note">${ICON.info}<div>ابدأ من تبويب <strong>إعداد الشبكة</strong>: اكتب اسم الشبكة وطولها، ثم عرّف الأحباس والإدارات. بعدها أضِف الترع وأدخِل القراءات.</div></div>`;

VIEWS.overview = () => {
  const b = State.branches.filter(x=>!x.isDalil);
  const totalZimaam = b.reduce((s,x)=>s+(+x.zimaam||0),0);
  const totalLen = State.config.totalLengthKm || b.reduce((s,x)=>s+(+x.len||0),0);
  const adminsCount = State.config.admins.length;
  const reachCount = State.config.reaches.length;
  const branchCount = State.branches.filter(x=>x.admin==='branch').length;
  /* المناسيب اللحظية: آخر قراءات */
  const day = State.readings[State.readDate] || {};
  const readKeys = Object.keys(day);
  const levelRows = State.branches
    .filter(x=>day[x.id] && (day[x.id].front!=null || day[x.id].back!=null))
    .slice(0,7);
  const avgLevel = levelRows.length
    ? levelRows.reduce((s,x)=>{const r=day[x.id];return s+((+r.front||0)+(+r.back||0))/2;},0)/levelRows.length
    : null;
  /* توزيع الاستخدامات */
  const moq = currentMoqannan();
  const agQ = (totalZimaam*moq)/3;  /* بالمناوبات */
  const drinkQ = (STATIONS_DATA.drinking||[]).reduce((s,x)=>s+(+x.q||0),0);
  const indQ = (STATIONS_DATA.industrial||[]).reduce((s,x)=>s+(+x.q||0),0);
  const useTotal = agQ+drinkQ+indQ || 1;
  const agPct = Math.round(agQ/useTotal*100);
  const drinkPct = Math.round(drinkQ/useTotal*100);
  const indPct = Math.round(indQ/useTotal*100);
  /* توزيع الزمام على الأحباس */
  const reachDist = (State.config.reaches||[]).map((rch,i)=>{
    const isLast = i===State.config.reaches.length-1;
    const inR = State.branches.filter(x=>!x.isDalil && (+x.km>=rch.from) && (isLast?true:(+x.km<rch.to)));
    const z = inR.reduce((s,x)=>s+(+x.zimaam||0),0);
    return {name:rch.name, z, pct: totalZimaam? Math.round(z/totalZimaam*100):0, n:inR.length};
  });

  return `
    ${setupBanner()}
    ${heritageBanner()}

    <!-- مؤشرات الأداء الرئيسية -->
    <div class="kpi-strip">
      ${kpiCard(ICON.branches,"إجمالى الفروع",fmt(branchCount),"فرع رئيسى",'--brand')}
      ${kpiCard('📏',"إجمالى الأطوال",fmt(totalLen,1),"كم",'--accent')}
      ${kpiCard(ICON.balance,"الزمام المقرر",fmt(State.config.officialZimaamK||(totalZimaam/1000),1),"ألف فدان",'--pen-green')}
      ${kpiCard('🌊',"الطلب اليومى",fmt((agQ+drinkQ+indQ)/1e6,1),"م.م³/يوم",'--brand')}
      ${kpiCard('🏛️',"الأحباس",fmt(reachCount),"حبس مائى",'--pen-purple')}
      ${kpiCard('🎯',"المحطات",fmt((STATIONS_DATA.drinking||[]).length+(STATIONS_DATA.industrial||[]).length),"شرب وصناعة",'--gold')}
    </div>

    <div class="dash-grid">
      <!-- المناسيب اللحظية -->
      <div class="card dash-levels">
        <div class="card-head"><div class="card-title">${ICON.readings} المناسيب اللحظية</div>
          <span class="card-sub">${State.readDate}</span></div>
        <div class="card-body" style="padding:0">
          ${levelRows.length ? `<div class="tbl-wrap" style="border:none">
          <table><thead><tr><th>الموقع</th><th class="num">المستوى الأمامى</th><th class="num">الخلفى</th><th class="num">التصرف</th></tr></thead>
          <tbody>${levelRows.map(x=>{
            const r=day[x.id]; const f=+r.front||0, bk=+r.back||0;
            const hasFlow = r.flow!=null && !isNaN(r.flow);
            return `<tr><td style="font-weight:600">${esc(x.name)}</td>
              <td class="num">${r.front!=null?fmt(f,2):'—'}</td>
              <td class="num">${r.back!=null?fmt(bk,2):'—'}</td>
              <td class="num" style="color:${hasFlow?'var(--brand)':'var(--ink-3)'};font-weight:700">${hasFlow?fmt(+r.flow,2):'—'}</td></tr>`;
          }).join("")}</tbody></table></div>
          <div style="padding:10px 14px;text-align:center"><a onclick="switchTab('readings')" style="cursor:pointer;color:var(--brand);font-family:var(--hand);font-size:1rem">عرض جميع المناسيب ←</a></div>`
          : `<div class="empty" style="padding:30px">${ICON.empty}<div class="t">لا قراءات لليوم</div>
            <div class="d">سجّل المناسيب من تبويب القراءات اليومية أو زامِن من جوجل شيت.</div></div>`}
        </div>
      </div>

      <!-- توزيع الاستخدامات -->
      <div class="card dash-usage">
        <div class="card-head"><div class="card-title">💧 توزيع الاستخدامات</div></div>
        <div class="card-body">
          ${donutChart([
            {label:'زراعة',pct:agPct,color:'#5a6b3a'},
            {label:'شرب',pct:drinkPct,color:'#5a3e22'},
            {label:'صناعة',pct:indPct,color:'#a86a2a'}
          ])}
        </div>
      </div>
    </div>

    <!-- توزيع الزمام على الأحباس -->
    <div class="card" style="margin-top:14px">
      <div class="card-head"><div class="card-title">${ICON.balance} توزيع الزمام على الأحباس</div>
        <span class="card-sub">${reachCount} حبس · ${adminsCount} إدارة</span></div>
      <div class="card-body">
        ${reachDist.map((r,i)=>{
          const cols=['#5a3e22','#8a4b2a','#5a6b3a'];
          return `<div style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;margin-bottom:5px">
              <span style="font-family:var(--hand);font-size:1.05rem;color:var(--brand)">${esc(r.name)}</span>
              <span class="mono" style="font-weight:700">${fmt(r.z)} فدان · ${r.pct}%</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${r.pct}%;background:${cols[i%3]}"></div></div>
          </div>`;
        }).join("")}
      </div>
    </div>

    <!-- إجراءات سريعة -->
    <div class="card" style="margin-top:14px">
      <div class="card-head"><div class="card-title">⚡ إجراءات سريعة</div></div>
      <div class="card-body">
        <div class="quick-grid">
          <button class="quick-btn" onclick="switchTab('branches')">${ICON.branches}<span>الترع والفروع</span></button>
          <button class="quick-btn" onclick="switchTab('readings')">${ICON.readings}<span>إدخال القراءات</span></button>
          <button class="quick-btn" onclick="switchTab('balance')">${ICON.balance}<span>الميزان المائى</span></button>
          <button class="quick-btn" onclick="switchTab('stations')">${ICON.stations}<span>محطات الشرب</span></button>
          <button class="quick-btn" onclick="syncFromSheet(false)">${ICON.refresh}<span>مزامنة القراءات</span></button>
          <button class="quick-btn" onclick="switchTab('setup')">${ICON.setup}<span>إعداد الشبكة</span></button>
        </div>
      </div>
    </div>
  `;
};

/* كارت KPI تراثى */
function kpiCard(icon, label, value, unit, accent){
  return `<div class="kpi-her" style="--ac:var(${accent})">
    <div class="kpi-her-ico">${icon}</div>
    <div class="kpi-her-label">${label}</div>
    <div class="kpi-her-value">${value}</div>
    <div class="kpi-her-unit">${unit}</div>
  </div>`;
}

/* رسم دائرى (donut) بسيط بـ conic-gradient */
function donutChart(items){
  let acc=0; const stops=[];
  items.forEach(it=>{ const start=acc; acc+=it.pct; stops.push(`${it.color} ${start}% ${acc}%`); });
  if(acc<100) stops.push(`#d3bd8e ${acc}% 100%`);
  return `<div class="donut-wrap">
    <div class="donut" style="background:conic-gradient(${stops.join(',')})">
      <div class="donut-hole"></div>
    </div>
    <div class="donut-legend">

<script>

AFTER.branches = () => {
  const host = $("#branchList");
  if(!State.branches.length){

      <button class="btn btn-primary" style="margin:0 auto" onclick="openBranchModal()">${ICON.plus}<span>إضافة ترعة</span></button></div>`;
    return;
  }
  const rows = [...State.branches].sort((a,b)=>(+a.km||0)-(+b.km||0)).map(b => {
    const Q = branchQ(b);

      <td style="font-weight:600">${esc(b.name)}</td>

      <td class="num">${Q?fmt(Q,2):"—"}</td>
      <td><div class="row-actions">
        <button class="mini-btn" title="تعديل" onclick="openBranchModal('${b.id}')">${ICON.edit}</button>
        <button class="mini-btn del" title="حذف" onclick="deleteBranch('${b.id}')">${ICON.trash}</button>

/* التصرف التصميمى للترعة من قطاعها (لو البيانات متوفرة) */
function branchQ(b){
  const bw=+b.bedWidth, z=+b.sideSlope, n=+b.manningN, S=+b.longSlope, y=+b.designDepth;
  if(bw>0 && n>0 && S>0 && y>0) return Hydraulics.discharge(bw, z||0, y, n, S);
  return 0;
}

/* ===== القراءات اليومية ===== */
VIEWS.readings = () => `
  ${setupBanner()}
  <div class="section-title">${ICON.readings} القراءات اليومية</div>
  <div class="toolbar">
    <div class="field" style="margin:0">
      <input type="date" id="readDate" value="${State.readDate}" onchange="changeReadDate(this.value)" style="width:auto">
    </div>
    <div class="grow"></div>
    <button class="btn btn-ghost btn-sm" onclick="clearReadings()">مسح قراءات اليوم</button>
  </div>
  <div class="hint">أدخِل المنسوب الأمامى والخلفى والتصرف المقاس لكل نقطة. تُحفظ تلقائياً بمفتاح التاريخ المختار.</div>
  <div class="card"><div id="readList"></div></div>
`;
AFTER.readings = () => {
  const host = $("#readList");
  if(!State.branches.length){
    host.innerHTML = `<div class="empty">${ICON.empty}<div class="t">لا توجد نقاط للقراءة</div>
      <div class="d">أضِف الترع أولاً من تبويب «الترع والفروع» لتظهر هنا لإدخال قراءاتها.</div></div>`;
    return;
  }
  recalcAllDischarges();   /* احسب التصرف لأى قراءات قديمة لها معادلة */
  const day = State.readings[State.readDate] || {};
  const rows = [...State.branches].sort((a,b)=>(+a.km||0)-(+b.km||0)).map(b => {
    const r = day[b.id] || {};
    return `<tr>
      <td style="font-weight:600">${esc(b.name)}</td>
      <td class="num"><input type="number" step="0.01" value="${r.front??""}" placeholder="—"
        oninput="setReading('${b.id}','front',this.value)" style="width:90px;text-align:center"></td>
      <td class="num"><input type="number" step="0.01" value="${r.back??""}" placeholder="—"
        oninput="setReading('${b.id}','back',this.value)" style="width:90px;text-align:center"></td>
      <td class="num">${isComputedFlow(b.id)
        ? `<input type="number" value="${r.flow??""}" placeholder="—" readonly title="محسوب تلقائياً${b.id==='hgz_mnr'?' (ميزان مائى من الفم)':' (منحنى التصريف)'}"
            style="width:90px;text-align:center;background:var(--ok-bg);border-color:var(--ok);font-weight:700;color:var(--brand);cursor:default">`
        : `<input type="number" step="0.01" value="${r.flow??""}" placeholder="—"
            oninput="setReading('${b.id}','flow',this.value)" style="width:90px;text-align:center">`}</td>
    </tr>`;
  }).join("");
  host.innerHTML = `<div class="tbl-wrap"><table>
    <thead><tr><th>النقطة</th><th class="num">المنسوب الأمامى</th><th class="num">المنسوب الخلفى</th><th class="num">التصرف (م³/ث)</th></tr></thead>
    <tbody>${rows}</tbody></table></div>`;
  /* تنسيق حقول الإدخال */
  $$("#readList input").forEach(i=>{
    i.style.padding="6px 8px";i.style.border="1px solid var(--line)";i.style.borderRadius="7px";i.style.fontFamily="var(--mono)";
  });
};

/* ===== الميزان المائى ===== */
/* خريطة نقطة تفرّع كل ترعة فرعية على الترعة الأم (كم) — لتوزيع المحطات على الأحباس */
const CANAL_OFFTAKE = {
  "الإسماعيلية": null,   // على الترعة الأم — يُستخدم كم المحطة نفسه
  "المنايف": 111.0,
  "السويس": 123.175,
  "بورسعيد": 126.0,
  "الصالحية": 74.7,
  "السعيدية": 74.7,
  "سيناء الغربى": 111.0
};
function _stEffectiveKm(s){
  const off = CANAL_OFFTAKE[s.canal];
  return (off==null) ? (s.km!=null?+s.km:null) : off;
}
/* سحب محطات الشرب والصناعة ضمن نطاق حبس (م³/يوم) */
function reachStationsDemand(rch, isLast){
  const inRange = s=>{ const k=_stEffectiveKm(s); return k!=null && k>=rch.from && (isLast ? true : k<rch.to); };
  let drinkQ=0, drinkN=0, indQ=0, indN=0;
  (STATIONS_DATA.drinking||[]).forEach(s=>{ if(inRange(s)){ drinkQ+=(+s.q||0); drinkN++; } });
  (STATIONS_DATA.industrial||[]).forEach(s=>{ if(inRange(s)){ indQ+=(+s.q||0); indN++; } });
  return { drinkQ, drinkN, indQ, indN };
}

VIEWS.balance = () => {
  const dours = ["أ","ب","ج"];
  const active = State.activeDour || "أ";
  return `
  ${setupBanner()}
  <div class="section-title">${ICON.balance} الميزان المائى للأحباس</div>
  <div class="hint">الطلب اليومى = زمام الترع التى تشرب اليوم (الدور النشط + الترع المستمرة) × المقنن (${currentMoqannan()} م³/فدان/يوم) + سحب الشرب والصناعة. الأدلة مُستبعدة من الزمام لتفادى التكرار.</div>
  <div class="card" style="margin-bottom:14px">
    <div class="card-body" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <span style="font-weight:700;color:var(--ink-2)">المناوبة النشطة اليوم:</span>
      <div style="display:flex;gap:8px">
        ${dours.map(d=>`<button class="btn btn-sm ${active===d?'btn-primary':'btn-ghost'}" onclick="setActiveDour('${d}')">دور ${d}</button>`).join("")}
      </div>
      <span style="font-size:.78rem;color:var(--ink-3)">(الترع المستمرة تشرب مع كل الأدوار)</span>
    </div>
  </div>
  <div id="balanceList"></div>
`;
};
function setActiveDour(d){ State.activeDour=d; renderView(); }
AFTER.balance = () => {
  const host = $("#balanceList");
  const reaches = State.config.reaches;
  if(!reaches.length){
    host.innerHTML = `<div class="card"><div class="empty">${ICON.empty}<div class="t">لا توجد أحباس مُعرّفة</div>
      <div class="d">عرّف أحباس الشبكة من تبويب «إعداد الشبكة» ليُحسب الميزان المائى لكل حبس.</div></div></div>`;
    return;
  }
  const moq = currentMoqannan();
  const active = State.activeDour || "أ";
  const ROTATIONS = 3;   /* عدد المناوبات أ/ب/ج */
  /* الحصة اليومية من الزمام لكل ترعة (فدان يشرب اليوم):
     - ترعة الدور النشط: تشرب كامل زمامها فى يومها
     - ترعة مستمرة: زمامها يتوزّع داخلياً على المناوبات → الحصة اليومية = الزمام ÷ عدد المناوبات
     - بدون دور: تُعامل كمستمرة (توزيع على المناوبات)
     - الأدلة: مستبعدة */
  const dailyZimaam = b => {
    if(b.isDalil) return 0;
    const z = +b.zimaam||0;
    const d = (b.dour||"").trim();
    if(d===active) return z;                 /* دور نشط اليوم → كامل */
    if(d==="مستمر" || d==="") return z/ROTATIONS;  /* مستمرة → حصة يومية */
    return 0;                                /* دور غير نشط اليوم */
  };
  host.innerHTML = `<div class="grid cols-2">` + reaches.map((rch,i) => {
    const isLast = (i === reaches.length-1);
    const inReach = State.branches.filter(b => !b.isDalil && (+b.km>=rch.from) && (isLast ? true : (+b.km<rch.to)));
    const totalZ = inReach.reduce((s,x)=>s+(+x.zimaam||0),0);              /* كل زمام الحبس */
    const dailyZ = inReach.reduce((s,x)=>s+dailyZimaam(x),0);              /* الزمام الذى يشرب اليوم فعلياً */
    const activeCount = inReach.filter(b=>dailyZimaam(b)>0).length;
    const agDemand = dailyZ*moq/1e6;                                       /* زراعى م.م³/يوم */
    const st = reachStationsDemand(rch, isLast);
    const drinkDemand = st.drinkQ/1e6;
    const indDemand = st.indQ/1e6;
    const totalDemand = agDemand + drinkDemand + indDemand;
    const palette = ["#0e5a8a","#13a3b5","#3a8f5a","#b9760a","#7c5cbf","#c2392b"];
    const col = palette[i%palette.length];
    return `<div class="card">
      <div class="card-head" style="border-bottom:3px solid ${col}">
        <div class="card-title" style="font-size:.95rem">${esc(rch.name)}</div>
        <span class="card-sub mono">ك ${fmt(rch.from,1)}—${fmt(rch.to,1)}</span>
      </div>
      <div class="card-body">
        <div class="grid cols-2" style="gap:10px">
          <div><div style="font-size:.78rem;color:var(--ink-2);font-weight:600">عدد الترع</div>
            <div class="mono" style="font-size:1.4rem;font-weight:600">${inReach.length}<span style="font-size:.7rem;color:var(--ink-3)"> · ${activeCount} تشرب اليوم</span></div></div>
          <div><div style="font-size:.78rem;color:var(--ink-2);font-weight:600">زمام يشرب اليوم</div>
            <div class="mono" style="font-size:1.4rem;font-weight:600">${fmt(dailyZ)}<span style="font-size:.7rem;color:var(--ink-3)"> / ${fmt(totalZ)} فدان</span></div></div>
        </div>
        <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:7px">
          <div style="display:flex;justify-content:space-between;align-items:baseline">
            <span style="font-size:.8rem;color:var(--ink-2)">🌾 طلب زراعى <span style="color:var(--ink-3);font-size:.72rem">(دور ${active}+مستمر)</span></span>
            <span class="mono" style="font-weight:600">${fmt(agDemand,3)}<span style="font-size:.7rem;color:var(--ink-3)"> م.م³/ي</span></span></div>
          <div style="display:flex;justify-content:space-between;align-items:baseline">
            <span style="font-size:.8rem;color:var(--ink-2)">💧 شرب <span style="color:var(--ink-3);font-size:.72rem">(${st.drinkN})</span></span>
            <span class="mono" style="font-weight:600">${fmt(drinkDemand,3)}<span style="font-size:.7rem;color:var(--ink-3)"> م.م³/ي</span></span></div>
          <div style="display:flex;justify-content:space-between;align-items:baseline">
            <span style="font-size:.8rem;color:var(--ink-2)">🏭 صناعة <span style="color:var(--ink-3);font-size:.72rem">(${st.indN})</span></span>
            <span class="mono" style="font-weight:600">${fmt(indDemand,3)}<span style="font-size:.7rem;color:var(--ink-3)"> م.م³/ي</span></span></div>
          <div style="display:flex;justify-content:space-between;align-items:baseline;padding-top:8px;margin-top:2px;border-top:1px dashed var(--line)">
            <span style="font-size:.84rem;font-weight:700;color:${col}">الطلب الكلى للحبس</span>
            <span class="mono" style="font-size:1.25rem;font-weight:700;color:${col}">${fmt(totalDemand,3)}<span style="font-size:.7rem;color:var(--ink-3)"> م.م³/ي</span></span></div>
        </div>
      </div></div>`;
  }).join("") + `</div>`;
};
</script>

function stRenderTable(){
  const host = $("#stTableHost"); if(!host) return;
  const q = normLite(_stSearch);
  let rows;
  if(_stTab==="drink"){
    rows = STATIONS_DATA.drinking.filter(s=>!q ||
      normLite(s.name).includes(q) || normLite(s.owner).includes(q) ||
      normLite(s.gov).includes(q) || normLite(s.canal).includes(q));
    rows.sort((a,b)=>(a.canal||"").localeCompare(b.canal||"")||(+a.km||0)-(+b.km||0));

    rows = STATIONS_DATA.industrial.filter(s=>!q ||
      normLite(s.name).includes(q) || normLite(s.admin).includes(q) || normLite(s.canal).includes(q));

    host.innerHTML = stIndTable(rows);
  }
}

/* ═══════════════════════════════════════════════
   محرك حساب التصرف من منحنى التصريف (Rating Curve)
   Q بالمليون م³/يوم · DS = المنسوب الخلفى (back)
   ═══════════════════════════════════════════════ */
const RATING_CURVES = {
  /* فم الإسماعيلية: خطية */
  fom_ism: { type:'linear', a:7.89, b:-107, label:'فم الإسماعيلية' },
  /* خلف الصالحية بعد التكريك (من 24 يوليو 2025): أسية */
  hgz_slh: { type:'power', a:0.00006, n:5.1938, label:'خلف الصالحية (بعد التكريك)' }
  /* حجز المنير: يُحسب بالميزان المائى (الفم − احتياجات الحبس الأول − الفواقد)
     وليس بمعادلة مستقلة — انظر calcDischarge */
};
/* يحسب التصرف من المنسوب الخلفى لنقطة لها معادلة؛ يرجّع null لو لا معادلة أو دخل غير صالح */
function calcDischarge(bid, back){
  const eq = RATING_CURVES[bid];
  if(!eq) return null;
  const ds = +back;
  if(!isFinite(ds)) return null;
  let q;
  if(eq.type==='linear'){ q = eq.a*ds + eq.b; }
  else { q = eq.a * Math.pow(ds, eq.n); }
  if(!isFinite(q) || q < 0) return null;   /* تصرف سالب غير منطقى */
  return q;   /* بالمليون م³/يوم */
}

/* ── الميزان المائى لحجز المنير ──
   تصرف المنير = تصرف الفم − احتياجات الحبس الأول (زراعى+شرب+صناعة) − الفواقد
   كل القيم بالمليون م³/يوم. يرجّع null لو تصرف الفم غير متاح. */
function lossFactor(){ return isSummer() ? 0.05 : 0.03; }   /* 5% صيف · 3% شتاء */

/* احتياجات حبس برقمه (0=الأول): زراعى + شرب + صناعة بالمليون م³/يوم */
function reachTotalDemand(reachIdx){
  const reaches = State.config.reaches || [];
  const rch = reaches[reachIdx];
  if(!rch) return 0;
  const isLast = reachIdx === reaches.length - 1;
  const moq = currentMoqannan();
  const active = State.activeDour || "أ";
  const ROT = 3;
  const inReach = State.branches.filter(b => !b.isDalil && (+b.km>=rch.from) && (isLast ? true : (+b.km<rch.to)));
  /* الزمام الذى يشرب اليوم فعلياً (حسب المناوبة) */
  const dailyZ = inReach.reduce((s,b)=>{
    if(b.isDalil) return s;
    const z = +b.zimaam||0;
    const d = (b.dour||"").trim();
    if(d===active) return s+z;
    if(d==="مستمر"||d==="") return s+z/ROT;
    return s;
  },0);
  const agDemand = dailyZ*moq/1e6;                 /* زراعى */
  const st = reachStationsDemand(rch, isLast);
  return agDemand + (st.drinkQ/1e6) + (st.indQ/1e6);   /* + شرب + صناعة */
}

/* تصرف المنير بالميزان المائى من تصرف الفم */
function calcMunirDischarge(){
  const d = State.readDate;
  const day = State.readings[d] || {};
  const fom = day['fom_ism'];
  if(!fom || fom.flow==null) return null;            /* لا تصرف للفم بعد */
  const fomQ = +fom.flow;
  const demand1 = reachTotalDemand(0);               /* احتياجات الحبس الأول */
  const losses = fomQ * lossFactor();                /* الفواقد */
  const q = fomQ - demand1 - losses;
  return q > 0 ? +q.toFixed(3) : 0;
}
/* هل لهذه النقطة معادلة تصرف؟ */
function hasRatingCurve(bid){ return !!RATING_CURVES[bid]; }
/* هل تصرف هذه النقطة محسوب تلقائياً (معادلة أو ميزان مائى)؟ */
function isComputedFlow(bid){ return hasRatingCurve(bid) || bid==='hgz_mnr'; }

/* يعيد حساب التصرف لكل القراءات الموجودة (للنقاط ذات المعادلات)
   يفيد القراءات القديمة المُدخَلة قبل تفعيل المحرك. يرجّع عدد ما حُسب. */
function recalcAllDischarges(){
  let n=0, changed=false;
  for(const date in State.readings){
    const day = State.readings[date];
    for(const bid in day){
      if(!hasRatingCurve(bid)) continue;
      const rec = day[bid];
      if(rec && rec.back!=null){
        const q = calcDischarge(bid, +rec.back);
        if(q!=null){
          const v = +q.toFixed(3);
          if(rec.flow !== v){ rec.flow = v; changed=true; n++; }
        }
      }
    }
  }
  /* حجز المنير: ميزان مائى من الفم (لليوم الحالى) */
  const d = State.readDate;
  if(State.readings[d] && State.readings[d]['fom_ism'] && State.readings[d]['fom_ism'].flow!=null){
    const mq = calcMunirDischarge();
    if(mq!=null){
      if(!State.readings[d]['hgz_mnr']) State.readings[d]['hgz_mnr']={};
      if(State.readings[d]['hgz_mnr'].flow !== mq){
        State.readings[d]['hgz_mnr'].flow = mq; changed=true; n++;
      }
    }
  }
  if(changed) Store.saveReadings();
  return n;
}

function setReading(bid,field,val){
  if(!State.readings[State.readDate]) State.readings[State.readDate]={};
  if(!State.readings[State.readDate][bid]) State.readings[State.readDate][bid]={};
  if(val===""){
    delete State.readings[State.readDate][bid][field];
  } else {
    State.readings[State.readDate][bid][field]=+val;
  }
  /* حساب التصرف تلقائياً من المنسوب الخلفى لو للنقطة معادلة تصريف */
  if(field==='back' && hasRatingCurve(bid)){
    const rec = State.readings[State.readDate][bid];
    if(val===""){
      delete rec.flow;
    } else {
      const q = calcDischarge(bid, +val);
      if(q!=null) rec.flow = +q.toFixed(3);
    }
    /* حدّث خانة التصرف المعروضة فوراً دون إعادة رسم الجدول كله */
    try{
      const cell = document.querySelector(`input[oninput*="'${bid}','flow'"], tr input[readonly][title*="محسوب"]`);
      const row = document.activeElement && document.activeElement.closest ? document.activeElement.closest('tr') : null;
      if(row){
        const flowInput = row.querySelector('td:last-child input');
        if(flowInput) flowInput.value = (rec.flow!=null ? rec.flow : "");
      }
    }catch(e){}
  }
  /* لو تغيّر منسوب/تصرف الفم → أعد حساب المنير بالميزان المائى */
  if(bid==='fom_ism'){
    const mq = calcMunirDischarge();
    const dd = State.readDate;
    if(mq!=null){
      if(!State.readings[dd]['hgz_mnr']) State.readings[dd]['hgz_mnr']={};
      State.readings[dd]['hgz_mnr'].flow = mq;
      State.readings[dd]['hgz_mnr']._ts = Date.now();
      try{

function exportAll(){
  const payload = { __app:"IrrigationDT", __version:"V1", exportedAt:new Date().toISOString(),
    config:State.config, branches:State.branches, readings:State.readings };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = el("a",{href:url, download:(State.config.shortName||"network")+"_"+todayKey()+".json"});
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  toast("صُدِّرت البيانات","ok");
}
function importPrompt(){
  const inp = el("input",{type:"file",accept:".json,application/json"});
  inp.addEventListener("change", () => {
    const f = inp.files[0]; if(!f) return;
    const rd = new FileReader();
    rd.onload = () => {
      try{
        const d = JSON.parse(rd.result);
        if(!d.config && !d.branches) throw new Error("ملف غير صالح");
        // خيار الدمج الآمن: القيمة الحقيقية لا تُمحى بصفر/فراغ. إلغاء = استبدال كامل.
        const doMerge = confirm(
          "دمج البيانات المستوردة مع الحالية؟\n\n"+
          "«موافق» = دمج آمن (القيم الحقيقية لا تُمحى — يُنصح به).\n"+
          "«إلغاء» = استبدال كامل بالملف المستورد."
        );
        if(d.config)   State.config   = Object.assign(structuredClone(DEFAULT_CONFIG), d.config);
        if(d.branches){
          if(doMerge && typeof window.__mergeBranches === "function"){
            State.branches = window.__mergeBranches(State.branches, d.branches, true);
          } else {
            State.branches = d.branches;
          }
        }
        if(d.readings) State.readings = d.readings;
        Store.saveConfig(); Store.saveBranches(); Store.saveReadings();
        renderShell(); toast(doMerge?"اكتمل الاستيراد (دمج)":"اكتمل الاستيراد (استبدال)","ok");
      }catch(e){ toast("تعذّر قراءة الملف: "+e.message,"danger"); }
    };
    rd.readAsText(f);
  });
  inp.click();
}

/* ────────────────────────────────────────────────
   10ب) المزامنة من جوجل شيت (عبر Apps Script Web App)
   ──────────────────────────────────────────────── */
function syncFromSheet(silent){
  var url = (State.config.sheetSyncUrl || "").trim();
  if(!url){
    if(!silent) toast("حدّد رابط المزامنة من تبويب الإعدادات أولاً","danger");
    return Promise.resolve(false);
  }
  if(!silent) toast("جارى التحديث من جوجل شيت…","brand");
  var sep = url.indexOf("?") >= 0 ? "&" : "?";
  return fetch(url + sep + "t=" + Date.now())
    .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
    .then(function(d){
      if(!d || !d.ok || !d.readings) throw new Error(d && d.error ? d.error : "استجابة غير صالحة");
      var merged = mergeSheetReadings(d.readings);
      recalcAllDischarges();
      Store.saveReadings();
      renderView();
      if(!silent) toast("تم تحديث "+merged+" قراءة من الشيت","ok");
      return true;
    })
    .catch(function(e){
      if(!silent) toast("تعذّر التحديث: "+e.message,"danger");
      return false;
    });
}

/* دمج قراءات الشيت داخل State.readings دون مسح المُدخل يدوياً
   front/back القادمة من الشيت تكتب فوق القيم القديمة لنفس اليوم/الترعة */
function mergeSheetReadings(remote){
  var count = 0;
  var validIds = {};
  State.branches.forEach(function(b){ validIds[b.id] = true; });
  for(var date in remote){
    if(!State.readings[date]) State.readings[date] = {};
    for(var bid in remote[date]){
      if(!validIds[bid]) continue;            /* تجاهل معرّفات غير موجودة بالتطبيق */
      var src = remote[date][bid] || {};
      var dst = State.readings[date][bid] || {};
      /* الأحدث يكسب: لو المحلية معدّلة بعد طابع الشيت، لا نكتب فوقها */
      var srcTs = +src._ts || 0;
      var dstTs = +dst._ts || 0;
      if(dstTs > 0 && dstTs > srcTs){
        /* المحلية أحدث — نتركها كما هى */
        State.readings[date][bid] = dst;
        continue;
      }
      /* الشيت أحدث (أو لا طابع محلى) — نطبّق قيمه */
      if(src.front != null && !isNaN(src.front)) dst.front = +src.front;
      if(src.back  != null && !isNaN(src.back))  dst.back  = +src.back;
      if(src.flow  != null && !isNaN(src.flow))  dst.flow  = +src.flow;
      if(srcTs > 0) dst._ts = srcTs;            /* نحفظ طابع الشيت للمقارنات القادمة */
      State.readings[date][bid] = dst;
      count++;
    }
  }
  return count;
}

   القراءات اليومية تظل تتزامن عبر جوجل شيت (منفصلة عن هذا).
   مبنى على بنية ISM-DT firebase-sync V28 (device_id + loop-prevention).
   يُحمّل قبل </body> بعد سكربت التطبيق الأساسى.
   ================================================================ */
(function () {
  'use strict';

  const VERSION = 'BR-V1';
  const CFG_KEY = 'irrdt_fb_cfg_v1';      // {projectId, apiKey, databaseURL?}
  const DEV_KEY = 'irrdt_fb_device_v1';
  const DB_PATH = 'irrigation-dt/branches';
  const OLD_APP_PATH = 'ismailia-dt/data';   /* مسار التطبيق القديم لمشاركة المناسيب */
  const DBNC_MS = 800;
  const RECONNECT_MS = 5000;

  const LS = { config:"irrdt.config.v1", branches:"irrdt.branches.v1", readings:"irrdt.readings.v1" };

  let fbDB=null, listenerRef=null, oldAppRef=null, debouncer=null;
  let _firstSnap=true, _myLastPushTs=0, _applying=false;

  function getDeviceId(){
    let id=localStorage.getItem(DEV_KEY);
    if(!id){ id='dev_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,9); localStorage.setItem(DEV_KEY,id); }
    return id;
  }
  const DEVICE_ID=getDeviceId();

  function loadCfg(){ try{ return JSON.parse(localStorage.getItem(CFG_KEY)||'{}'); }catch(e){ return {}; } }
  function saveCfg(c){ localStorage.setItem(CFG_KEY, JSON.stringify(c)); }
  function isCfg(){ const c=loadCfg(); return !!(c.projectId && c.apiKey); }

  function loadScript(src){
    return new Promise((res,rej)=>{
      if(document.querySelector('script[src="'+src+'"]')){ res(); return; }
      const s=document.createElement('script'); s.src=src; s.onload=res;
      s.onerror=()=>rej(new Error('فشل تحميل: '+src)); document.head.appendChild(s);
    });
  }

  async function getDB(){
    if(fbDB) return fbDB;
    const cfg=loadCfg();
    if(!cfg.projectId||!cfg.apiKey) throw new Error('Firebase config غير مهيأ');
    if(!cfg.databaseURL) cfg.databaseURL='https://'+cfg.projectId+'-default-rtdb.firebaseio.com';
    await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js');
    const app=firebase.apps.length?firebase.apps[0]:firebase.initializeApp(cfg);
    fbDB=firebase.database(app); return fbDB;
  }

  /* snapshot من البيانات المحلية */
  function snapshot(){
    let config={}, branches=[], readings={};
    try{ config=JSON.parse(localStorage.getItem(LS.config)||'{}'); }catch(e){}
    try{ branches=JSON.parse(localStorage.getItem(LS.branches)||'[]'); }catch(e){}
    try{ readings=JSON.parse(localStorage.getItem(LS.readings)||'{}'); }catch(e){}
    return { _v:VERSION, _ts:Date.now(), _at:new Date().toISOString(), _dev:DEVICE_ID,
             config:config, branches:branches, readings:readings };
  }

  /* تطبيق بيانات السحابة محلياً */
  function applyRemote(data){
    if(!data||typeof data!=='object') return false;
    _applying=true;
    try{
      let n=0;
      /* ترجيح زمنى: هل الوارد أحدث من آخر رفع محلى؟ */
      const remoteTs = +(data._ts||0);
      const localPushTs = +(localStorage.getItem('irrdt_fb_lastpush_ts')||0);
      const remoteNewer = remoteTs >= localPushTs;
      if(data.config && typeof data.config==='object'){
        localStorage.setItem(LS.config, JSON.stringify(data.config)); n++;
      }
      if(Array.isArray(data.branches)){
        /* دمج بدل استبدال: قيمة حقيقية لا تُمحى بصفر وارد (يحمى مانينج وغيره) */
        let localBr=[];
        try{ localBr=JSON.parse(localStorage.getItem(LS.branches)||'[]'); }catch(e){}
        const mergedBr = mergeBranches(localBr, data.branches, remoteNewer);
        localStorage.setItem(LS.branches, JSON.stringify(mergedBr)); n++;
      }
      /* دمج المناسيب: ندمج الوارد مع المحلى (لا نمسح ما لم يُرفع بعد) */
      if(data.readings && typeof data.readings==='object'){
        let local={};
        try{ local=JSON.parse(localStorage.getItem(LS.readings)||'{}'); }catch(e){}
        const merged=mergeReadings(local, data.readings);
        localStorage.setItem(LS.readings, JSON.stringify(merged)); n++;
      }
      // أعد تحميل حالة التطبيق وأعد الرسم
      try{ if(typeof Store!=='undefined' && Store.load) Store.load(); }catch(e){}
      setTimeout(refreshUI, 150);
      return n>0;
    } finally {
      setTimeout(()=>{ _applying=false; }, 1000);
    }
  }
  /* ── دمج الترع على مستوى كل ترعة وكل حقل ──
     القاعدة: القيمة "الحقيقية" (غير صفر/فارغة/null) تكسب دائماً على الصفر أو الفراغ.
     لو الطرفين لهما قيمة حقيقية مختلفة → الأحدث زمنياً (remoteNewer) يكسب.
     الهدف: ألا تُمحى قيمة أدخلها المستخدم (مثل معامل مانينج) بنسخة قديمة فيها صفر. */
  function _isEmptyVal(v){
    return v===null || v===undefined || v==='' ||
           (typeof v==='number' && v===0) ||
           (typeof v==='string' && v.trim()==='');
  }
  function mergeBranchFields(loc, rem, remoteNewer){
    const out = Object.assign({}, loc);
    const keys = new Set([...Object.keys(loc||{}), ...Object.keys(rem||{})]);
    for(const k of keys){
      const lv = loc ? loc[k] : undefined;
      const rv = rem ? rem[k] : undefined;
      const lEmpty = _isEmptyVal(lv), rEmpty = _isEmptyVal(rv);
      if(lEmpty && !rEmpty)       out[k] = rv;   // المحلية فاضية والوارد فيه قيمة → خُذ الوارد
      else if(!lEmpty && rEmpty)  out[k] = lv;   // الوارد فاضى والمحلية فيها قيمة → أبقِ المحلية
      else if(lEmpty && rEmpty)   out[k] = (rv!==undefined ? rv : lv); // كلاهما فاضٍ
      else                        out[k] = remoteNewer ? rv : lv;      // كلاهما قيمة → الأحدث يكسب
    }
    return out;
  }
  function mergeBranches(local, remote, remoteNewer){
    const locArr = Array.isArray(local) ? local : [];
    const remArr = Array.isArray(remote) ? remote : [];
    const byId = new Map();
    const order = [];
    for(const b of locArr){ if(b && b.id!=null){ byId.set(b.id, b); order.push(b.id); } }
    for(const b of remArr){
      if(!b || b.id==null) continue;
      if(byId.has(b.id)){
        byId.set(b.id, mergeBranchFields(byId.get(b.id), b, remoteNewer));
      } else {
        byId.set(b.id, b); order.push(b.id);   // ترعة جديدة من السحابة → أضِفها
      }
    }
    return order.map(id => byId.get(id));
  }
  /* نعرّضها للاستيراد اليدوى كى يدمج بدل الاستبدال (يحمى مانينج وغيره) */
  if(typeof window!=='undefined'){ window.__mergeBranches = mergeBranches; }

  /* دمج قراءتين: الأحدث (حسب _ts) يكسب على مستوى كل نقطة */
  function mergeReadings(local, remote){
    const out=JSON.parse(JSON.stringify(local||{}));
    for(const date in remote){
      if(!out[date]) out[date]={};
      for(const bid in remote[date]){
        const rem=remote[date][bid]||{};
        const loc=out[date][bid]||{};
        const remTs=+rem._ts||0, locTs=+loc._ts||0;
        if(locTs>0 && locTs>remTs){
          /* المحلية أحدث — نبقيها */
          out[date][bid]=loc;
        } else {
          /* الوارد أحدث (أو لا طابع محلى) — يكسب */
          out[date][bid]=Object.assign({}, loc, rem);
        }
      }
    }
    return out;
  }

  function refreshUI(){
    try{
      const ae=document.activeElement;
      if(ae && (ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'||ae.isContentEditable)){
        ae.addEventListener('blur', function _b(){ ae.removeEventListener('blur',_b); _doRefresh(); }, {once:true});
        return;
      }
      _doRefresh();
    }catch(e){}
  }
  function _doRefresh(){
    try{
      if(typeof renderShell==='function') renderShell();
      else if(typeof renderView==='function') renderView();
    }catch(e){}
  }

  async function push(silent){
    if(_applying) return;
    try{
      const db=await getDB(); const data=snapshot();
      /* حماية ضد الرفع الفارغ: لا ترفع snapshot خالٍ من الترع فوق سحابة تحتوى بيانات */
      const brCount = Array.isArray(data.branches) ? data.branches.length : 0;
      if(brCount===0){
        try{
          const snap = await db.ref(DB_PATH+'/branches').once('value');
          const remoteBr = snap.exists() ? snap.val() : null;
          if(Array.isArray(remoteBr) && remoteBr.length>0){
            console.warn('[FB-BR] أُلغى رفع فارغ لحماية بيانات السحابة');
            setBadge('ok');
            return;
          }
        }catch(e){ /* تعذّر الفحص → تابع بحذر */ }
      }
      _myLastPushTs=data._ts;
      await db.ref(DB_PATH).set(data);
      localStorage.setItem('irrdt_fb_lastpush_ts', String(data._ts));
      setBadge('ok');
      if(!silent && typeof toast==='function') toast('☁️ تمت مزامنة بيانات الترع','ok');
    }catch(e){
      setBadge('error');
      if(!silent && typeof toast==='function') toast('تعذّرت المزامنة: '+e.message,'danger');
      throw e;
    }
  }

  async function subscribe(){
    const db=await getDB();
    if(listenerRef){ try{ listenerRef.off(); }catch(e){} listenerRef=null; }
    _firstSnap=true;
    _myLastPushTs=+(localStorage.getItem('irrdt_fb_lastpush_ts')||0);
    listenerRef=db.ref(DB_PATH);
    listenerRef.on('value', (snap)=>{
      try{
        const remote=snap.val();
        if(!remote||typeof remote!=='object'){ _firstSnap=false; return; }
        const remoteTs=+(remote._ts||0), remoteDev=remote._dev||'';
        if(_firstSnap){
          _firstSnap=false;
          if(remoteTs>_myLastPushTs && remoteDev!==DEVICE_ID){
            applyRemote(remote);
            if(typeof toast==='function') toast('☁️ حُمّلت أحدث بيانات الترع من السحابة','ok');
          }
          return;
        }
        if(remoteDev===DEVICE_ID && remoteTs===_myLastPushTs) return;
        if(remoteDev!==DEVICE_ID){
          applyRemote(remote);
          _myLastPushTs=remoteTs;
          if(typeof toast==='function') toast('🔄 تحديث بيانات الترع من جهاز آخر','ok');
          setBadge('ok');
        }
      }catch(e){ console.error('[FB-BR listener]',e); }
    }, (err)=>{
      console.warn('[FB-BR listener error]',err);
      setBadge('error');
      setTimeout(()=>{ if(isCfg()) subscribe().catch(e=>console.error(e)); }, RECONNECT_MS);
    });
    /* ── مستمع موجّه على قراءات اليوم فقط من التطبيق القديم (توفير استهلاك) ── */
    bindOldAppListener();
    setBadge('ok');
    return db;
  }
  /* يربط مستمع قراءات اليوم من التطبيق القديم (drBag/[تاريخ اليوم] فقط) */
  async function bindOldAppListener(){
    if(!isCfg()) return;
    let db;
    try{ db = await getDB(); }catch(e){ return; }
    try{
      if(oldAppRef){ try{ oldAppRef.off(); }catch(e){} oldAppRef=null; }
      const today = (typeof State!=='undefined' && State.readDate) ? State.readDate : new Date().toISOString().slice(0,10);
      oldAppRef = db.ref(OLD_APP_PATH + '/drBag/' + today);
      oldAppRef.on('value', (snap)=>{
        try{
          const dayData = snap.val();          /* { نقطة: {f,b,flow} } لليوم فقط */
          if(!dayData || typeof dayData!=='object') return;
          const drBag = {}; drBag[today] = dayData;
          const converted = convertOldReadings(drBag);
          if(Object.keys(converted).length===0) return;
          let local={};
          try{ local=JSON.parse(localStorage.getItem(LS.readings)||'{}'); }catch(e){}
          const merged = mergeReadings(local, converted);
          localStorage.setItem(LS.readings, JSON.stringify(merged));
          try{ if(typeof Store!=='undefined' && Store.load) Store.load(); }catch(e){}
          try{ if(typeof recalcAllDischarges==='function') recalcAllDischarges(); }catch(e){}
          setTimeout(refreshUI, 150);
          if(typeof toast==='function') toast('🔄 مزامنة مناسيب اليوم مع التطبيق القديم','ok');
        }catch(e){ console.error('[old-app readings]',e); }
      }, (err)=>{ console.warn('[old-app listener error]',err); });
    }catch(e){ console.warn('[old-app subscribe]',e); }
  }
  /* نعرّضها لإعادة الربط عند تغيير تاريخ القراءة */
  if(typeof window!=='undefined') window.__irrRebindOldApp = bindOldAppListener;
  /* يحوّل قراءات التطبيق القديم {تاريخ:{نقطة:{f,b,flow}}} لشكل الجديد {front,back,flow} */
  function convertOldReadings(drBag){
    const out={};
    for(const date in drBag){
      const day=drBag[date]; if(!day||typeof day!=='object') continue;
      out[date]={};
      for(const pt in day){
        const r=day[pt]||{};
        const rec={};
        if(r.f!=null && r.f!=='' && !isNaN(r.f)) rec.front=+r.f;
        if(r.b!=null && r.b!=='' && !isNaN(r.b)) rec.back=+r.b;
        if(r.flow!=null && r.flow!=='' && !isNaN(r.flow)) rec.flow=+r.flow;
        if(r._ts) rec._ts=+r._ts;
        if(Object.keys(rec).length) out[date][pt]=rec;
      }
      if(Object.keys(out[date]).length===0) delete out[date];
    }
    return out;
  }

  function triggerPush(){
    if(!isCfg()||_applying) return;
    if(debouncer) clearTimeout(debouncer);
    setBadge('syncing');
    debouncer=setTimeout(()=>push(true).catch(()=>{}), DBNC_MS);
  }

  /* اعتراض دوال حفظ الترع/الإعدادات لرفع تلقائى عند أى تعديل */
  function hookSaveFns(){
    if(typeof Store==='undefined') return;
    ['saveBranches','saveConfig','saveReadings'].forEach(fn=>{
      if(typeof Store[fn]==='function' && !Store[fn]._fbHooked){
        const orig=Store[fn].bind(Store);
        Store[fn]=function(){ const r=orig.apply(this,arguments); try{ triggerPush(); }catch(e){} return r; };
        Store[fn]._fbHooked=true;
      }
    });
  }

  /* ── Badge صغير لحالة المزامنة ── */
  function setBadge(state){
    const el=document.getElementById('fbBranchBadge'); if(!el) return;
    const map={ok:'#4ade80',syncing:'#ffb020',error:'#f87171',off:'#94a3b8'};
    el.style.background=map[state]||map.off;
    el.title='مزامنة الترع: '+(state==='ok'?'متصل':state==='syncing'?'جارٍ الرفع':state==='error'?'خطأ':'غير مهيأ');
  }

  /* ── نافذة الإعداد ── */
  function openConfig(){
    let host=document.getElementById('fbBranchModal');
    if(host) host.remove();
    const c=loadCfg();
    host=document.createElement('div');
    host.id='fbBranchModal';
    host.style.cssText='position:fixed;inset:0;z-index:100000;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:16px';
    host.innerHTML='<div style="background:#fff;max-width:440px;width:100%;border-radius:14px;padding:22px;font-family:system-ui,sans-serif;direction:rtl">'+
      '<h3 style="margin:0 0 4px;font-size:18px;color:#0e3b5c">مزامنة بيانات الترع (Firebase)</h3>'+
      '<p style="margin:0 0 16px;font-size:12px;color:#64748b;line-height:1.7">عدّل أى ترعة على أى جهاز → تتزامن لحظياً مع باقى الأجهزة. أدخِل بيانات مشروع Firebase (نفس مشروع تطبيق الإسماعيلية إن رغبت).</p>'+
      '<label style="display:block;font-size:12px;color:#475569;margin-bottom:4px">Project ID</label>'+
      '<input id="fbPid" value="'+(c.projectId||'')+'" placeholder="my-project-id" style="width:100%;padding:9px 11px;border:1px solid #cbd5e1;border-radius:8px;margin-bottom:12px;direction:ltr;text-align:left">'+
      '<label style="display:block;font-size:12px;color:#475569;margin-bottom:4px">API Key</label>'+
      '<input id="fbKey" value="'+(c.apiKey||'')+'" placeholder="AIza..." style="width:100%;padding:9px 11px;border:1px solid #cbd5e1;border-radius:8px;margin-bottom:12px;direction:ltr;text-align:left">'+
      '<label style="display:block;font-size:12px;color:#475569;margin-bottom:4px">Database URL (اختيارى)</label>'+
      '<input id="fbUrl" value="'+(c.databaseURL||'')+'" placeholder="https://...firebaseio.com" style="width:100%;padding:9px 11px;border:1px solid #cbd5e1;border-radius:8px;margin-bottom:16px;direction:ltr;text-align:left">'+
      '<div style="display:flex;gap:10px;flex-wrap:wrap">'+
      '<button id="fbSave" style="flex:1;padding:10px;background:#0e3b5c;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700">حفظ وتفعيل</button>'+
      '<button id="fbPushNow" style="padding:10px 14px;background:#4ade80;color:#063;border:none;border-radius:8px;cursor:pointer;font-weight:700">رفع الآن</button>'+
      '<button id="fbClose" style="padding:10px 14px;background:#e2e8f0;color:#334155;border:none;border-radius:8px;cursor:pointer">إغلاق</button>'+
      '</div></div>';
    document.body.appendChild(host);
    host.addEventListener('click',e=>{ if(e.target===host) host.remove(); });
    document.getElementById('fbSave').onclick=async function(){
      const cfg={ projectId:document.getElementById('fbPid').value.trim(),
                  apiKey:document.getElementById('fbKey').value.trim(),
                  databaseURL:document.getElementById('fbUrl').value.trim() };
      if(!cfg.projectId||!cfg.apiKey){ if(typeof toast==='function') toast('أدخِل Project ID و API Key','danger'); return; }
      if(!cfg.databaseURL) cfg.databaseURL='https://'+cfg.projectId+'-default-rtdb.firebaseio.com';
      saveCfg(cfg);
      fbDB=null;
      try{ await subscribe(); hookSaveFns(); await push(false); host.remove(); }
      catch(e){ if(typeof toast==='function') toast('فشل الاتصال: '+e.message,'danger'); }
    };
    document.getElementById('fbPushNow').onclick=()=>push(false).catch(()=>{});
    document.getElementById('fbClose').onclick=()=>host.remove();
  }

  /* زر عائم لفتح الإعداد + badge الحالة */
  function mountFab(){
    if(document.getElementById('fbBranchFab')) return;
    const fab=document.createElement('div');
    fab.id='fbBranchFab';
    fab.title='مزامنة بيانات الترع (Firebase)';
    fab.onclick=openConfig;
    fab.style.cssText='position:fixed;left:18px;bottom:84px;z-index:99998;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#b45309);box-shadow:0 4px 14px rgba(245,158,11,.45);display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid rgba(255,255,255,.25)';
    fab.innerHTML='<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>'+
      '<span id="fbBranchBadge" style="position:absolute;top:-2px;right:-2px;width:13px;height:13px;border-radius:50%;background:#94a3b8;border:2px solid #fff"></span>';
    document.body.appendChild(fab);
  }

  function boot(){
    mountFab();
    if(isCfg()){
      subscribe().then(hookSaveFns).catch(e=>{ console.warn('[FB-BR] boot',e); setBadge('error'); });
    } else {
      setBadge('off');
    }
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', ()=>setTimeout(boot,1200));
  else setTimeout(boot,1200);

  // كشف عام للاستدعاء اليدوى
  window.IrrFB = { open:openConfig, push:()=>push(false), config:loadCfg };
})();

</script>
